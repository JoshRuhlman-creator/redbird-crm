<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redbird Cannabis — Pre-Order Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root {
      --red: #D4001C;
      --text: #1a1a1a;
      --text-muted: #555;
      --text-faint: #999;
      --border: #e5e5e5;
      --surface: #fafafa;
      --white: #fff;
      --radius: 10px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f4f4;
      color: var(--text);
      min-height: 100vh;
    }
    .portal-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .portal-logo { height: 30px; width: auto; }
    .portal-header-date {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-faint);
    }
    .portal-divider {
      border: none;
      border-top: 1px solid var(--border);
    }
    .portal-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .portal-welcome { margin-bottom: 24px; }
    .portal-acct-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .portal-tagline {
      font-size: 12px;
      color: var(--text-faint);
      font-family: 'Space Mono', monospace;
    }
    .config-banner {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 11px 16px;
      margin-bottom: 18px;
      font-size: 12px;
      color: #92400e;
      display: none;
    }
    .week-block {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .week-hdr {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .week-hdr:hover { background: #efefef; }
    .week-label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      min-width: 100px;
    }
    .week-strains { font-size: 11px; color: var(--text-faint); }
    .week-avail { margin-left: auto; font-size: 12px; color: var(--text-muted); }
    .week-avail strong { color: var(--text); }
    .week-toggle { font-size: 11px; color: var(--text-faint); }
    .week-body { display: none; }
    .week-body.open { display: block; }

    /* ── New grouped layout styling ── */
    .format-section {
      padding: 16px 20px;
      background: #f9f9f9;
      border-bottom: 1px solid var(--border);
    }
    .format-section h3 {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 12px;
      color: #333;
    }
    .size-group { margin-bottom: 20px; }
    .size-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    .prod-table { width: 100%; border-collapse: collapse; }
    .prod-table th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 7px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      background: var(--white);
    }
    .prod-table th.right { text-align: right; }
    .prod-table td {
      padding: 9px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
    }
    .prod-row-soldout td { opacity: 0.5; }
    .prod-label { font-weight: 500; color: var(--text); }
    .prod-avail {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      font-size: 12px;
    }
    .sold-out-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      background: #1a1a1a;
      border-radius: 4px;
      padding: 3px 7px;
      float: right;
    }
    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--white);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      line-height: 1;
    }
    .qty-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }
    .qty-input {
      width: 54px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }
    .qty-input:focus {
      outline: none;
      border-color: var(--red);
    }

    .cart-bar {
      position: sticky;
      bottom: 0;
      background: var(--white);
      border-top: 2px solid var(--red);
      padding: 14px 40px;
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
      z-index: 100;
    }
    .cart-summary { font-size: 13px; color: var(--text-muted); }
    .cart-summary strong { color: var(--text); font-size: 15px; }
    .cart-btn {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-left: auto;
    }
    .cart-btn:hover { opacity: .88; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: 14px;
      width: 100%;
      max-width: 580px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-hdr {
      padding: 22px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-faint);
      line-height: 1;
    }
    .modal-body { padding: 24px 28px; }
    .modal-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }
    .modal-input:focus {
      outline: none;
      border-color: var(--red);
    }
    .modal-submit-btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }
    .modal-submit-btn:hover { opacity: .88; }
    .modal-submit-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<header class="portal-header">
  <img src="https://via.placeholder.com/140x30?text=Redbird+Logo" class="portal-logo" alt="Redbird Cannabis">
  <span class="portal-header-date" id="portalDate"></span>
</header>

<hr class="portal-divider">

<main class="portal-main">
  <div class="config-banner" id="configBanner">
    ⚠ EmailJS not configured — no emails will send until credentials are added.
  </div>

  <div class="portal-welcome">
    <div class="portal-acct-name" id="portalAcctName">Loading…</div>
    <div class="portal-tagline">Redbird Cannabis — Projected Availability Pre-Order</div>
  </div>

  <div id="portalWeeks"></div>
</main>

<div class="cart-bar" id="cartBar">
  <div class="cart-summary">
    <strong id="cartCount">0</strong> items in cart
  </div>
  <button class="cart-btn" onclick="openCart()">Review Order →</button>
</div>

<div class="modal-overlay" id="cartModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-title">Review Your Order</span>
      <button class="modal-close" onclick="closeCart()">×</button>
    </div>
    <div class="modal-body" id="cartModalBody"></div>
  </div>
</div>

<script>
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
const REDBIRD_EMAIL = 'josh.ruhlman@redbird-cannabis.com';

let cart = {};
let accountName = '';

const PRODUCTS = [
  { key: 'p35', label: '3.5g Flower',   field: 'p35' },
  { key: 'p14', label: '14g Micros',    field: 'p14' },
  { key: 'p28', label: '28g',           field: 'p28' },
  { key: 'j1',  label: '1g Joint',      field: 'j1'  },
  { key: 'j2',  label: '2pk Joint',     field: 'j2'  },
  { key: 'j10', label: '10pk Joints',   field: 'j10' },
  { key: 'inf', label: 'Infused',       field: 'inf' }
];

// ── Paste your full INV_DATA array here ──
const INV_DATA = [
  // ←←← PASTE ALL YOUR INV_DATA OBJECTS HERE ←←←
  // Example placeholder (replace with your real data):
  { "w": "2025-01-06", "strain": "Raspberry Dosido", "room": 6, "totes": 0, "live": false, "fd": "2025-01-13", "jd": "2025-01-20", "p35": 995, "p14": 291, "p28": 0, "j1": 0, "j2": 0, "j10": 600, "inf": 0 },
  // ... your full array ...
];

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('portalDate').textContent = new Date().toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric'
  });

  const params = new URLSearchParams(window.location.search);
  accountName = decodeURIComponent(params.get('account') || '');
  if (!accountName) {
    document.getElementById('portalAcctName').textContent = 'Unknown Account';
    document.getElementById('portalWeeks').innerHTML = '<p style="color:#999;font-size:13px">No account specified. Add ?account=YourAccountName to the URL.</p>';
    return;
  }
  document.getElementById('portalAcctName').textContent = accountName;

  if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
    document.getElementById('configBanner').style.display = 'block';
  } else {
    emailjs.init(EMAILJS_PUBLIC_KEY);
  }

  renderPortal();
});

function renderPortal() {
  const today = new Date().toISOString().slice(0,10);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 84);
  const cutoffStr = cutoff.toISOString().slice(0,10);

  const upcoming = INV_DATA.filter(r => r.w >= today && r.w <= cutoffStr && r.strain);

  const byWeek = {};
  upcoming.forEach(r => (byWeek[r.w] ??= []).push(r));

  const weeks = Object.keys(byWeek).sort();
  const parts = weeks.map((week, wi) => {
    const rows = byWeek[week];
    const bodyId = `pw-body-${wi}`;
    const isOpen = wi < 2 ? ' open' : '';

    const groups = {
      flower: { p35: [], p14: [], p28: [] },
      joints: { j1: [], j2: [], j10: [], inf: [] }
    };

    rows.forEach(r => {
      const base = `${week}__${r.strain}`;
      const live = !!r.live;

      if (r.p35) groups.flower.p35.push({ r, ck: `${base}__p35`, max: r.p35, label: '3.5g Flower', live });
      if (r.p14) groups.flower.p14.push({ r, ck: `${base}__p14`, max: r.p14, label: '14g Micros', live });
      if (r.p28) groups.flower.p28.push({ r, ck: `${base}__p28`, max: r.p28, label: '28g', live });

      if (r.j1)  groups.joints.j1 .push({ r, ck: `${base}__j1`,  max: r.j1,  label: '1g Joint', live });
      if (r.j2)  groups.joints.j2 .push({ r, ck: `${base}__j2`,  max: r.j2,  label: '2pk Joint', live });
      if (r.j10) groups.joints.j10.push({ r, ck: `${base}__j10`, max: r.j10, label: '10pk Joints', live });
      if (r.inf) groups.joints.inf.push({ r, ck: `${base}__inf`, max: r.inf, label: 'Infused', live });
    });

    const sortDesc = (a,b) => b.max - a.max;
    Object.values(groups.flower).forEach(arr => arr.sort(sortDesc));
    Object.values(groups.joints).forEach(arr => arr.sort(sortDesc));

    const total = rows.reduce((s,r) => s + (r.p35||0) + (r.p14||0) + (r.p28||0) + (r.j1||0) + (r.j2||0) + (r.j10||0) + (r.inf||0), 0);

    let html = `<div class="week-block">
      <div class="week-hdr" onclick="toggleWeek('${bodyId}')">
        <span class="week-label">${week}</span>
        <span class="week-strains">${rows.length} strain${rows.length > 1 ? 's' : ''}</span>
        <span class="week-avail"><strong>${total.toLocaleString()}</strong> units proj.</span>
        <span class="week-toggle">▼</span>
      </div>
      <div class="week-body${isOpen}" id="${bodyId}">`;

    const renderRow = ({ ck, r, max, label, live }) => {
      const sk = ck.replace(/[^a-zA-Z0-9]/g, '_');
      const qty = cart[ck]?.qty ?? 0;
      const sold = max === 0;
      return `<tr class="${sold ? 'prod-row-soldout' : ''}">
        <td class="prod-label">${r.strain}${live ? '<span class="strain-live">LIVE RESIN</span>' : ''}</td>
        <td class="prod-avail">${sold ? '<span class="sold-out-badge">SOLD OUT</span>' : max.toLocaleString()}</td>
        <td><div class="qty-wrap">
          <button class="qty-btn" onclick="adj('${ck}','${week}','${r.strain}','${label}',${max},-1)">−</button>
          <input class="qty-input" type="number" min="0" max="${max}" value="${qty}" id="q_${sk}"
                 onchange="sq('${ck}','${week}','${r.strain}','${label}',${max},this.value)">
          <button class="qty-btn" onclick="adj('${ck}','${week}','${r.strain}','${label}',${max},1)">+</button>
        </div></td>
      </tr>`;
    };

    // Flower section
    html += '<div class="format-section flower"><h3>Flower</h3>';
    Object.entries(groups.flower).forEach(([key, items]) => {
      if (!items.length) return;
      const prod = PRODUCTS.find(p => p.key === key);
      html += `<div class="size-group"><div class="size-label">${prod.label}</div><table class="prod-table"><tbody>`;
      items.forEach(item => html += renderRow(item));
      html += '</tbody></table></div>';
    });
    html += '</div>';

    // Joints / Infused section
    const hasJoints = Object.values(groups.joints).some(a => a.length);
    if (hasJoints) {
      html += '<div class="format-section joints"><h3>Joints / Infused</h3>';
      Object.entries(groups.joints).forEach(([key, items]) => {
        if (!items.length) return;
        const prod = PRODUCTS.find(p => p.key === key);
        html += `<div class="size-group"><div class="size-label">${prod.label}</div><table class="prod-table"><tbody>`;
        items.forEach(item => html += renderRow(item));
        html += '</tbody></table></div>';
      });
      html += '</div>';
    }

    html += '</div></div>';
    return html;
  });

  document.getElementById('portalWeeks').innerHTML = parts.length
    ? parts.join('')
    : '<p style="color:#999;font-size:13px;padding:20px 0">No upcoming inventory found.</p>';
}

function toggleWeek(id) {
  document.getElementById(id)?.classList.toggle('open');
}

function adj(ck, week, strain, label, max, delta) {
  const inp = document.getElementById('q_' + ck.replace(/[^a-zA-Z0-9]/g, '_'));
  if (!inp) return;
  const next = Math.max(0, Math.min(max, (parseInt(inp.value) || 0) + delta));
  inp.value = next;
  updateCart(ck, week, strain, label, max, next);
}

function sq(ck, week, strain, label, max, val) {
  updateCart(ck, week, strain, label, max, Math.max(0, Math.min(max, parseInt(val) || 0)));
}

function updateCart(ck, week, strain, label, max, qty) {
  if (qty > 0) {
    cart[ck] = { week, strain, prodLabel: label, qty, max };
  } else {
    delete cart[ck];
  }
  const total = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const bar = document.getElementById('cartBar');
  bar.style.display = total > 0 ? 'flex' : 'none';
  document.getElementById('cartCount').textContent = total.toLocaleString();
}

function openCart() {
  const items = Object.values(cart);
  if (!items.length) return;
  items.sort((a,b) => a.week.localeCompare(b.week) || a.strain.localeCompare(b.strain) || a.prodLabel.localeCompare(b.prodLabel));

  const totalUnits = items.reduce((s,i) => s + i.qty, 0);
  const rows = items.map(i => `
    <tr>
      <td style="padding:9px 0;border-bottom:1px solid #e5e5e5;font-size:13px;font-weight:600">${i.strain}</td>
      <td style="padding:9px 0;border-bottom:1px solid #e5e5e5;font-size:12px;color:#555">${i.prodLabel}</td>
      <td style="padding:9px 0;border-bottom:1px solid #e5e5e5;font-size:11px;color:#999;font-family:Space Mono,monospace">${i.week}</td>
      <td style="padding:9px 0;border-bottom:1px solid #e5e5e5;text-align:right;font-size:13px">${i.qty.toLocaleString()}</td>
    </tr>
  `).join('');

  document.getElementById('cartModalBody').innerHTML = `
    <p style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#999;margin:0 0 12px 0">Order Summary</p>
    <table width="100%" cellpadding="0" cellspacing="0">
      <thead><tr>
        <th style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;padding-bottom:8px;border-bottom:2px solid #e5e5e5;text-align:left">Strain</th>
        <th style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;padding-bottom:8px;border-bottom:2px solid #e5e5e5;text-align:left">Product</th>
        <th style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;padding-bottom:8px;border-bottom:2px solid #e5e5e5;text-align:left">Week</th>
        <th style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;padding-bottom:8px;border-bottom:2px solid #e5e5e5;text-align:right">Qty</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="3" style="padding-top:12px;font-weight:700;font-size:13px">Total Units</td>
      <td style="padding-top:12px;font-weight:700;font-size:13px;text-align:right">${totalUnits.toLocaleString()}</td></tr></tfoot>
    </table>
    <hr style="border:none;border-top:1px solid #e5e5e5;margin:20px 0">
    <p style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#999;margin:0 0 14px 0">Your Contact Info</p>
    <div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px">Name</label><input class="modal-input" id="buyerName" placeholder="Your name"></div>
    <div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px">Email</label><input class="modal-input" id="buyerEmail" type="email" placeholder="you@dispensary.com"></div>
    <div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px">Phone (optional)</label><input class="modal-input" id="buyerPhone" placeholder="(509) 555-0100"></div>
    <div style="margin-bottom:12px"><label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px">Notes (optional)</label><textarea class="modal-input" id="buyerNotes" rows="3" style="resize:vertical" placeholder="Special requests or delivery notes…"></textarea></div>
    <button class="modal-submit-btn" id="submitBtn" onclick="submitOrder()">Submit Pre-Order</button>
    <div id="successScreen" style="display:none;text-align:center;padding:40px 20px">
      <div style="font-size:44px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Order Submitted!</div>
      <div style="font-size:13px;color:#555;line-height:1.7">Your pre-order has been received.<br>A confirmation has been sent to your email.<br><br>A Redbird rep will follow up shortly.</div>
    </div>
  `;
  document.getElementById('cartModal').classList.add('open');
}

function closeCart() {
  document.getElementById('cartModal').classList.remove('open');
}

function submitOrder() {
  const name = (document.getElementById('buyerName').value || '').trim();
  const email = (document.getElementById('buyerEmail').value || '').trim();
  if (!name || !email) return alert('Please enter your name and email address.');

  const items = Object.values(cart).sort((a,b) => a.week.localeCompare(b.week) || a.strain.localeCompare(b.strain) || a.prodLabel.localeCompare(b.prodLabel));
  const totalUnits = items.reduce((s,i) => s + i.qty, 0);
  const orderDate = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const orderLines = items.map(i => `${i.strain} — ${i.prodLabel} — Week of ${i.week} — ${i.qty.toLocaleString()} units`).join('\n');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const params = {
    to_email: email,
    account_name: accountName,
    buyer_name: name,
    buyer_email: email,
    buyer_phone: document.getElementById('buyerPhone').value || '—',
    order_date: orderDate,
    order_details: orderLines,
    total_units: totalUnits.toLocaleString(),
    notes: document.getElementById('buyerNotes').value || 'None'
  };

  const onSuccess = () => {
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    cart = {};
    document.getElementById('cartBar').style.display = 'none';
  };

  if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
    console.log('EmailJS not configured — logging params only:', params);
    onSuccess();
    return;
  }

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
    .then(() => emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { ...params, to_email: REDBIRD_EMAIL }))
    .then(onSuccess)
    .catch(err => {
      btn.disabled = false;
      btn.textContent = 'Submit Pre-Order';
      alert('Error sending. Please try again.');
      console.error(err);
    });
}
</script>
</body>
</html>
