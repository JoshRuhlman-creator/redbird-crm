<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redbird Cannabis &mdash; Pre-Order Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D4001C;--text:#1a1a1a;--text-muted:#555;--text-faint:#999;--border:#e5e5e5;--surface:#fafafa;--white:#fff;--radius:10px}
body{font-family:'DM Sans',sans-serif;background:#f4f4f4;color:var(--text);min-height:100vh}
.portal-header{background:var(--white);border-bottom:1px solid var(--border);padding:18px 40px;display:flex;align-items:center;justify-content:space-between}
.portal-logo{height:30px;width:auto}
.portal-header-date{font-family:'Space Mono',monospace;font-size:12px;color:var(--text-faint)}
.portal-divider{border:none;border-top:1px solid var(--border)}
.portal-main{max-width:860px;margin:0 auto;padding:32px 24px}
.portal-welcome{margin-bottom:24px}
.portal-acct-name{font-size:22px;font-weight:700;margin-bottom:4px}
.portal-tagline{font-size:12px;color:var(--text-faint);font-family:'Space Mono',monospace}
.config-banner{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:11px 16px;margin-bottom:18px;font-size:12px;color:#92400e;display:none}
.week-block{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.week-hdr{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.week-hdr:hover{background:#efefef}
.week-label{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--text);min-width:100px}
.week-strains{font-size:11px;color:var(--text-faint)}
.week-avail{margin-left:auto;font-size:12px;color:var(--text-muted)}
.week-avail strong{color:var(--text)}
.week-toggle{font-size:11px;color:var(--text-faint)}
.week-body{display:none}
.week-body.open{display:block}
.strain-block{border-bottom:1px solid var(--border)}
.strain-block:last-child{border-bottom:none}
.strain-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 8px;background:var(--surface)}
.strain-name{font-size:13px;font-weight:700;color:var(--text)}
.strain-live{font-size:9px;font-weight:700;background:#ede9fe;color:#7c3aed;border-radius:4px;padding:2px 6px;margin-left:6px;letter-spacing:.5px;vertical-align:middle}
.strain-delivery{font-size:11px;color:var(--text-faint);font-family:'Space Mono',monospace}
.prod-table{width:100%;border-collapse:collapse}
.prod-table th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);padding:7px 20px;text-align:left;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;background:var(--white)}
.prod-table th.right{text-align:right}
.prod-table td{padding:9px 20px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.prod-table tr:last-child td{border-bottom:none}
.prod-row-soldout td{opacity:.5}
.prod-label{font-weight:500;color:var(--text)}
.prod-avail{text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted);font-size:12px}
.sold-out-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:#1a1a1a;border-radius:4px;padding:3px 7px;float:right}
.qty-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);line-height:1}
.qty-btn:hover{border-color:var(--red);color:var(--red)}
.qty-input{width:54px;height:28px;border:1px solid var(--border);border-radius:6px;text-align:center;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text)}
.qty-input:focus{outline:none;border-color:var(--red)}
.cart-bar{position:sticky;bottom:0;background:var(--white);border-top:2px solid var(--red);padding:14px 40px;display:none;align-items:center;gap:16px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100}
.cart-summary{font-size:13px;color:var(--text-muted)}
.cart-summary strong{color:var(--text);font-size:15px}
.cart-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-left:auto}
.cart-btn:hover{opacity:.88}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:22px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-faint);line-height:1}
.modal-body{padding:24px 28px}
.modal-input{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text)}
.modal-input:focus{outline:none;border-color:var(--red)}
.modal-submit-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
.modal-submit-btn:hover{opacity:.88}
.modal-submit-btn:disabled{opacity:.4;cursor:not-allowed}</style>
</head>

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('portalDate').textContent = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  var params = new URLSearchParams(window.location.search);
  accountName = decodeURIComponent(params.get('account') || '');
  if(!accountName) {
    document.getElementById('portalAcctName').textContent = 'Unknown Account';
    document.getElementById('portalWeeks').innerHTML = '<p style="color:#999;font-size:13px">No account specified. Add ?account=YourAccountName to the URL.</p>';

  }

    document.getElementById('configBanner').style.display = 'block';

function renderPortal() {
  var todayStr = new Date().toISOString().slice(0,10);
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 84);
  var cutoffStr = cutoff.toISOString().slice(0,10);

  var upcoming = INV_DATA.filter(function(r) {
    return r.w >= todayStr && r.w <= cutoffStr && r.strain;
  });

  var byWeek = {};
  upcoming.forEach(function(r) {
    if(!byWeek[r.w]) byWeek[r.w] = [];
    byWeek[r.w].push(r);
  });

  var parts = [];
  var weeks = Object.keys(byWeek).sort();
  weeks.forEach(function(week, wi) {
    var rows = byWeek[week];
    var bodyId = 'pw-body-' + wi;
    var openClass = wi < 2 ? ' open' : '';
    var strainCount = rows.length;
    var totUnits = rows.reduce(function(s,r){ return s+r.p35+r.p14+r.p28+r.j1+r.j2+r.j10+r.inf; },0);

    var p = '<div class="week-block">';
    p += '<div class="week-hdr" onclick="toggleWeek(\x27' + bodyId + '\x27)">';
    p += '<span class="week-label">' + week + '</span>';
    p += '<span class="week-strains">' + strainCount + ' strain' + (strainCount!==1?'s':'') + '</span>';
    p += '<span class="week-avail"><strong>' + totUnits.toLocaleString() + '</strong> units proj.</span>';
    p += '<span class="week-toggle">&#9662;</span></div>';
    p += '<div class="week-body' + openClass + '" id="' + bodyId + '">';

    rows.forEach(function(r) {
      var strainKey = week + '__' + r.strain;
      p += '<div class="strain-block">';
      p += '<div class="strain-hdr">';
      p += '<span class="strain-name">' + r.strain + (r.live ? '<span class="strain-live">LIVE RESIN</span>' : '') + '</span>';
      p += '<span class="strain-delivery">';
      if(r.fd) p += 'Flower: ' + r.fd;
      if(r.jd && r.jd !== r.fd) p += ' &nbsp;&middot;&nbsp; Joints: ' + r.jd;
      p += '</span></div>';
      p += '<table class="prod-table"><thead><tr><th>Product</th><th class="right">Available</th><th class="right">Order Qty</th></tr></thead><tbody>';

      // For live resin only show flower products, for others show all
      var showProds = r.live ? PRODUCTS.filter(function(pr){ return pr.key==='p35'; }) : PRODUCTS;

      showProds.forEach(function(pr) {
        var max = r[pr.field] || 0;
        var soldOut = max === 0;
        var ck = strainKey + '__' + pr.key;
        var sk = ck.replace(/[^a-zA-Z0-9]/g, '_');
        var cq = cart[ck] ? cart[ck].qty : 0;

        p += '<tr class="' + (soldOut ? 'prod-row-soldout' : '') + '">';
        p += '<td class="prod-label">' + pr.label + '</td>';
        if(soldOut) {
          p += '<td class="prod-avail" colspan="2"><span class="sold-out-badge">SOLD OUT</span></td>';
        } else {
          p += '<td class="prod-avail">' + max.toLocaleString() + '</td>';
          p += '<td><div class="qty-wrap">';
          p += '<button class="qty-btn" onclick="adj(\x27'+ck+'\x27,\x27'+week+'\x27,\x27'+r.strain+'\x27,\x27'+pr.label+'\x27,'+max+',-1)">&#8722;</button>';
          p += '<input class="qty-input" type="number" min="0" max="'+max+'" value="'+cq+'" id="q_'+sk+'" onchange="sq(\x27'+ck+'\x27,\x27'+week+'\x27,\x27'+r.strain+'\x27,\x27'+pr.label+'\x27,'+max+',this.value)">';
          p += '<button class="qty-btn" onclick="adj(\x27'+ck+'\x27,\x27'+week+'\x27,\x27'+r.strain+'\x27,\x27'+pr.label+'\x27,'+max+',1)">+</button>';
          p += '</div></td>';
        }
        p += '</tr>';
      });

      p += '</tbody></table></div>';
    });

    p += '</div></div>';
    parts.push(p);
  });

  document.getElementById('portalWeeks').innerHTML = parts.length ? parts.join('') : '<p style="color:#999;font-size:13px;padding:20px 0">No upcoming inventory found.</p>';
}

function toggleWeek(id) {
  var el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function adj(ck, week, strain, prodLabel, max, delta) {
  var sk = ck.replace(/[^a-zA-Z0-9]/g, '_');
  var inp = document.getElementById('q_' + sk);
  if(!inp) return;
  var next = Math.max(0, Math.min(max, (parseInt(inp.value)||0) + delta));
  inp.value = next;
  uc(ck, week, strain, prodLabel, max, next);
}

function sq(ck, week, strain, prodLabel, max, val) {
  uc(ck, week, strain, prodLabel, max, Math.max(0, Math.min(max, parseInt(val)||0)));
}

function uc(ck, week, strain, prodLabel, max, qty) {
  if(qty > 0) { cart[ck] = {week:week, strain:strain, prodLabel:prodLabel, qty:qty, max:max}; }
  else { delete cart[ck]; }
  var total = Object.values(cart).reduce(function(s,i){ return s+i.qty; },0);
  var cb = document.getElementById('cartBar');
  cb.style.display = total > 0 ? 'flex' : 'none';
  document.getElementById('cartCount').textContent = total.toLocaleString();
}

    return '<tr>'
      +'<td style="padding:9px 0;border-bottom:1px solid #e5e5e5;font-size:13px;font-weight:600">'+i.strain+'</td>'

  var orderDate = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var orderLines = items.map(function(i){ return i.strain+' \u2014 '+i.prodLabel+' \u2014 Week of '+i.week+' \u2014 '+i.qty.toLocaleString()+' units'; }).join('\n');
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Sending\u2026';
  var params = {
    to_email: email, account_name: accountName, buyer_name: name,
    buyer_email: email, buyer_phone: document.getElementById('buyerPhone').value||'\u2014',
    order_date: orderDate, order_details: orderLines,
    total_units: totalUnits.toLocaleString(), notes: document.getElementById('buyerNotes').value||'None'
  };
  function onSuccess() {
    document.getElementById('submitBtn').style.display='none';
    document.getElementById('successScreen').style.display='block';
    cart={}; document.getElementById('cartBar').style.display='none';
  }
  if(EMAILJS_PUBLIC_KEY==='YOUR_PUBLIC_KEY') { console.log('EmailJS not configured:',params); onSuccess(); return; }
  emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,params)
    .then(function(){ return emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,Object.assign({},params,{to_email:REDBIRD_EMAIL})); })
    .then(onSuccess)
    .catch(function(err){ btn.disabled=false; btn.textContent='Submit Pre-Order'; alert('Error sending. Please try again.'); console.error(err); });
}

</script>
</body>
</html>
